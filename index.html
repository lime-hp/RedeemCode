<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Heartopia Redeem Codes</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"M PLUS Rounded 1c",sans-serif;
    background:linear-gradient(180deg,#EAF8FF,#F9FDFF);
    color:#486574;
    min-height:100vh;
    padding:24px 16px;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    color:#59AFE8;
    text-align:center;
    font-size:2rem;
}

.subtitle{
    text-align:center;
    margin-top:10px;
    color:#6C8898;
    line-height:1.6;
}

.expire{
    margin:22px auto;
    background:#FFF7E7;
    color:#C9892A;
    border-radius:18px;
    padding:14px;
    text-align:center;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
}

.section{
    margin-top:24px;
}

.section-title{
    color:#59AFE8;
    font-weight:700;
    font-size:16px;
    margin-bottom:12px;
    padding-left:4px;
}

.card{
    border:2px solid #D7F0FF;
    background:#fff;
    border-radius:18px;
    padding:18px 10px;
    text-align:center;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(96,173,225,.18);
    transition:.15s;
    user-select:none;
}

.card:hover{
    transform:translateY(-2px);
    background:#F7FCFF;
}

.card:active{
    transform:scale(.97);
}

.code{
    font-family:"JetBrains Mono",monospace;
    font-size:14px;
    font-weight:500;
    word-break:break-word;
}

.toast{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#58AEE8;
    color:white;
    padding:12px 20px;
    border-radius:999px;
    opacity:0;
    transition:.25s;
    pointer-events:none;
    z-index:999;
}

.toast.show{
    opacity:1;
    top:35px;
}

.footer{
    text-align:center;
    margin-top:28px;
    color:#8BA4B2;
    font-size:13px;
}

.divider{
    border:none;
    border-top:2px dashed #CFEFFF;
    margin:28px 0;
}

@media (max-width:420px){

    .code{
        font-size:12px;
    }

}
</style>
</head>

<body>

<div class="toast" id="toast">
✅ コピーしました！
</div>

<div class="container">

<h1>🎁 Redeem Codes</h1>

<div class="subtitle">
タップするだけでコピーできます
</div>

<div class="expire">
⏰ 有効期限<br>
2026/8/1 0:59 (JST)
</div>

<div id="content"></div>

<div class="footer">
Made with 🩵 for Heartopia Players
</div>

</div>

<script>

const newCodes = [
    "a6n2p8k7m3"
];

const codes = [
    "180daysjoy",
    "callofwhales0709",
    "oceanguardians",
    "q7a3p5r2k6",
    "n3k7q5a8m2",
    "p9m4r1a6k7",
    "a5r8k2m7q4",
    "k1n6q9m3p8",
    "m8p2a7n4r9",
    "Cherish180",
    "halfyear180",
    "r4k9q1a5m6",
    "together180"
];

const content = document.getElementById("content");

function createSection(title, list){

    if(list.length === 0) return;

    const section = document.createElement("section");
    section.className = "section";

    if(title){

        const heading = document.createElement("div");
        heading.className = "section-title";
        heading.textContent = title;
        section.appendChild(heading);

    }

    const grid = document.createElement("div");
    grid.className = "grid";

    list.forEach(code=>{

        const card=document.createElement("div");
        card.className="card";

        card.innerHTML=`<div class="code">${code}</div>`;

        card.onclick=async()=>{

            await navigator.clipboard.writeText(code);

            const toast=document.getElementById("toast");

            toast.classList.add("show");

            setTimeout(()=>{
                toast.classList.remove("show");
            },1500);

        };

        grid.appendChild(card);

    });

    section.appendChild(grid);

    content.appendChild(section);

}

createSection("🩵 7/21追加", newCodes);
// 区切り線
const divider = document.createElement("hr");
divider.className = "divider";
content.appendChild(divider);
createSection("", codes);
</script>

</body>
</html>
